name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  ci:
    name: Build, typecheck, verify, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build packages (schema, core, adapters)
        run: |
          npx tsc -p packages/schema/tsconfig.json
          npx tsc -p packages/core/tsconfig.json
          npx tsc -p packages/adapters/tsconfig.json

      - name: Typecheck CLI
        run: npx tsc -p packages/cli/tsconfig.json --noEmit

      - name: Typecheck worker
        run: npx tsc -p packages/worker/tsconfig.json --noEmit

      - name: Run verify scripts
        run: |
          node scripts/check-no-sensitive-info.mjs
          node scripts/verify-disclaimers.mjs

      - name: Run tests
        run: npm test --workspaces --if-present
