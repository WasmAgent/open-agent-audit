name: Deploy

# Triggered on push to main.
# Required GitHub Secrets:
#   CLOUDFLARE_API_TOKEN  — Cloudflare API token (Workers deploy rights)
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID
#   CF_D1_DATABASE_ID     — D1 database ID for oaa-meta

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build packages (schema → core → adapters)
        run: |
          npx tsc -p packages/schema/tsconfig.json
          npx tsc -p packages/core/tsconfig.json
          npx tsc -p packages/adapters/tsconfig.json

      - name: Build dashboard
        run: |
          cd packages/dashboard
          npm install
          npm run build

      - name: Generate wrangler.jsonc from template
        env:
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
        run: |
          sed "s/REPLACE_ME_D1_ID/${CF_D1_DATABASE_ID}/" \
            examples/cloudflare/wrangler.example.jsonc > wrangler.jsonc

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "3"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.jsonc
