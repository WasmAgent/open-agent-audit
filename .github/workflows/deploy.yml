name: Deploy

# Deploys to Cloudflare Workers on every push to main.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — API token with Workers:Edit, D1:Edit, R2:Edit, Queues:Edit
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID
#   CF_D1_DATABASE_ID     — D1 database ID for "oaa-meta"

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install all dependencies
        run: npm install

      - name: Build packages (schema → core → adapters)
        run: |
          npx tsc -p packages/schema/tsconfig.json
          npx tsc -p packages/core/tsconfig.json
          npx tsc -p packages/adapters/tsconfig.json

      - name: Build dashboard
        run: |
          cd packages/dashboard
          npm install
          npm run build

      - name: Generate wrangler.jsonc
        env:
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
        run: |
          python3 - <<'EOF'
          import os, re

          src = open("examples/cloudflare/wrangler.example.jsonc").read()
          d1_id = os.environ["CF_D1_DATABASE_ID"]
          out = src.replace("REPLACE_ME_D1_ID", d1_id)
          open("wrangler.jsonc", "w").write(out)
          print("wrangler.jsonc written")
          # Sanity check — abort if placeholder still present
          if "REPLACE_ME" in out:
              raise SystemExit("ERROR: unreplaced placeholder in wrangler.jsonc")
          EOF

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.jsonc
