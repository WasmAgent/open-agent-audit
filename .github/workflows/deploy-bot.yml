name: Deploy Bot to VPS

# Triggers only when bot code or agent definitions change.
# Required GitHub Secrets:
#   VPS_SSH_KEY   — private key for root@VPS (no passphrase)
#   VPS_HOST      — VPS IP or hostname

on:
  push:
    branches: ["main"]
    paths:
      - "bot/**"
      - ".claude/agents/**"
      - ".claude/settings.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-bot:
    name: Deploy bot to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /root/github/open-agent-audit

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Fix permissions so claudebot can read
            chmod -R o+rX /root/github/open-agent-audit/bot/
            chmod -R o+rX /root/github/open-agent-audit/.claude/

            # Restart bot services
            systemctl restart claude-scheduler claude-worker@1

            # Verify
            sleep 3
            systemctl is-active claude-scheduler claude-worker@1
            echo "Deploy complete: $(git log --oneline -1)"
