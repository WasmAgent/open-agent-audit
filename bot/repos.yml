# mode controls what the bot can do with this repo:
#   full         — monitor + AI discussion + implement code + PR + merge
#   discuss_only — monitor + AI discussion only, NO code changes or PRs

repositories:
  # ── Full mode (bot can write code) ────────────────────────────────────────
  - id: agent-trust-infra
    repo: WasmAgent/agent-trust-infra
    project_name: agent-trust-infra
    mode: full
    base_branch: main
    bare_repo_path: /srv/claude-bot/repos/agent-trust-infra.git
    worktree_root: /srv/claude-bot/worktrees/agent-trust-infra
    test_cmds:
      - bun test
    enqueue_label: claude
    docs_label: claude-docs
    hard_label: claude-hard
    ultracode_label: claude-ultracode
    deep_review_label: claude-deep-review
    no_automerge_label: claude-no-automerge
    automerge_default: true
    enabled: true

  - id: wasmagent
    repo: WasmAgent/wasmagent
    project_name: wasmagent
    mode: full
    base_branch: main
    bare_repo_path: /srv/claude-bot/repos/wasmagent.git
    worktree_root: /srv/claude-bot/worktrees/wasmagent
    test_cmds: []
    enqueue_label: claude
    docs_label: claude-docs
    hard_label: claude-hard
    ultracode_label: claude-ultracode
    deep_review_label: claude-deep-review
    no_automerge_label: claude-no-automerge
    automerge_default: true
    enabled: true

  - id: dot-github
    repo: WasmAgent/.github
    project_name: dot-github
    mode: full
    base_branch: main
    bare_repo_path: /srv/claude-bot/repos/dot-github.git
    worktree_root: /srv/claude-bot/worktrees/dot-github
    test_cmds: []
    enqueue_label: claude
    docs_label: claude-docs
    hard_label: claude-hard
    ultracode_label: claude-ultracode
    deep_review_label: claude-deep-review
    no_automerge_label: claude-no-automerge
    automerge_default: true
    enabled: true

  # ── Discuss-only (monitor + AI discussion, no code changes) ───────────────
  - id: open-agent-audit
    repo: WasmAgent/open-agent-audit
    project_name: open-agent-audit
    mode: discuss_only
    base_branch: main
    enqueue_label: claude
    automerge_default: false
    enabled: true

  - id: claude-bot-sandbox
    repo: telleroutlook/claude-bot-sandbox
    project_name: claude-bot-sandbox
    mode: discuss_only
    base_branch: main
    enqueue_label: claude
    automerge_default: false
    enabled: true

  - id: wasmagent-js
    repo: WasmAgent/wasmagent-js
    project_name: wasmagent-js
    mode: discuss_only
    base_branch: main
    enqueue_label: claude
    automerge_default: false
    enabled: true

  - id: bscode
    repo: WasmAgent/bscode
    project_name: bscode
    mode: discuss_only
    base_branch: main
    enqueue_label: claude
    automerge_default: false
    enabled: true

  - id: trace-pipeline
    repo: WasmAgent/trace-pipeline
    project_name: trace-pipeline
    mode: discuss_only
    base_branch: main
    enqueue_label: claude
    automerge_default: false
    enabled: true

  - id: wasmagent-ops
    repo: WasmAgent/wasmagent-ops
    project_name: wasmagent-ops
    mode: discuss_only
    base_branch: main
    enqueue_label: claude
    automerge_default: false
    enabled: true
