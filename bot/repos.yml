# mode controls what the bot can do with this repo:
#   full        — monitor + implement code changes + PR + merge  (default)
#   discuss_only — monitor + AI discussion, but NO code changes or PRs
#
# Examples:
#   A repo you want to watch and respond to issues but not touch the code: mode: discuss_only
#   A repo you fully trust the bot to modify: mode: full (or omit, full is default)

repositories:
  - id: open-agent-audit
    repo: WasmAgent/open-agent-audit
    project_name: open-agent-audit
    mode: full
    base_branch: main
    bare_repo_path: /srv/claude-bot/repos/open-agent-audit.git
    worktree_root: /srv/claude-bot/worktrees/open-agent-audit
    test_cmds:
      - npm run lint
      - npm run typecheck
      - npm run build
      - npm test
    enqueue_label: claude
    docs_label: claude-docs
    hard_label: claude-hard
    ultracode_label: claude-ultracode
    deep_review_label: claude-deep-review
    no_automerge_label: claude-no-automerge
    automerge_default: true
    enabled: true

  - id: wasmagent-js
    repo: WasmAgent/wasmagent-js
    project_name: wasmagent-js
    mode: full
    base_branch: main
    bare_repo_path: /srv/claude-bot/repos/wasmagent-js.git
    worktree_root: /srv/claude-bot/worktrees/wasmagent-js
    test_cmds:
      - bun test
      - bun run build
      - bun run lint
    enqueue_label: claude
    docs_label: claude-docs
    hard_label: claude-hard
    ultracode_label: claude-ultracode
    deep_review_label: claude-deep-review
    no_automerge_label: claude-no-automerge
    automerge_default: true
    enabled: true

  - id: claude-bot-sandbox
    repo: WasmAgent/claude-bot-sandbox
    project_name: claude-bot-sandbox
    mode: full
    base_branch: main
    bare_repo_path: /srv/claude-bot/repos/claude-bot-sandbox.git
    worktree_root: /srv/claude-bot/worktrees/claude-bot-sandbox
    test_cmds:
      - npm test
      - npm run lint
      - npm run build
    enqueue_label: claude
    docs_label: claude-docs
    hard_label: claude-hard
    ultracode_label: claude-ultracode
    deep_review_label: claude-deep-review
    no_automerge_label: claude-no-automerge
    automerge_default: true
    enabled: true

  - id: trace-pipeline
    repo: WasmAgent/trace-pipeline
